<!DOCTYPE html>
<html>
    <body>
        <h2>Objects Data Structure and Arrays</h2>
        <h2>.join() and .pop()</h2>
        <p>The .join() method joins array elements into a string and the .pop() method removes
            the last element from the array.
        </p>
        <p id=".join"></p>
        <p id=".pop1"></p>
        <p id=".pop2"></p>
        <script>
            var students = ["Alice", "Bob", "Charlie", "Daisy"];
            document.getElementById(".join").innerHTML = students.join(" # ")
            document.getElementById(".pop1").innerHTML = students;
            students.pop()
            document.getElementById(".pop2").innerHTML = students;
        </script>
    </body>
</html>
